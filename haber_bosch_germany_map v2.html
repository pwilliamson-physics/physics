// ── ICON FACTORY ──────────────────────────────────────────────────────────
function makeIcon(status) {
  const cfg = {
    active:  { fill: '#16a34a', ring: '#bbf7d0', size: 18 },
    hist:    { fill: '#dc2626', ring: '#fecaca', size: 15 },
    partial: { fill: '#d97706', ring: '#fef08a', size: 15 },
  }[status] || { fill: '#6b7280', ring: '#d1d5db', size: 14 };

  return L.divIcon({
    className: '',
    html: `<div style="
      width:${cfg.size}px; height:${cfg.size}px;
      background:${cfg.fill};
      border:2.5px solid ${cfg.ring};
      border-radius:50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.2);
    "></div>`,
    iconSize: [cfg.size, cfg.size],
    iconAnchor: [cfg.size/2, cfg.size/2],
  });
}

    <div class="popup-meta">

      <span class="badge ${badgeCls}">${badgeTxt}</span>
    </div>
    <div class="popup-desc">${s.desc}</div>
    <div class="popup-facts">
      <div class="popup-fact">🔬 <strong>Significance:</strong> ${s.sig}</div>
      <div class="popup-fact">🏭 <strong>Capacity:</strong> ${s.cap}</div>
      <div class="popup-fact">🏢 <strong>Operator:</strong> ${s.op}</div>
    </div>
  </div>`;
}

// ── DRAW RAILWAYS ─────────────────────────────────────────────────────────
const railPolylines = railways.map(r => {
  const pl = L.polyline(r.coords, {
    color: r.color,
    weight: r.weight,
    opacity: 0.82,
    dashArray: r.dash,
    lineJoin: 'round',
    lineCap: 'round',
  }).addTo(map);
  pl.bindPopup(`<div style="min-width:200px;max-width:270px">
    <div class="rail-pname" style="color:${r.color}">${r.name}</div>
    <div class="rail-pdesc">${r.desc}</div>
  </div>`);
  return pl;
});

// ── DRAW SITE MARKERS ─────────────────────────────────────────────────────
const siteMarkers = sites.map(s => {
  const m = L.marker(s.coords, { icon: makeIcon(s.status) }).addTo(map);
  m.bindPopup(sitePopup(s), { maxWidth: 310 });
  m._status = s.status;
  return m;
});

// ── FILTER ────────────────────────────────────────────────────────────────
let railVisible = true;

function filterSites(mode, btn) {
  ['btn-all','btn-active','btn-hist'].forEach(id => {
    const b = document.getElementById(id);
    b.className = 'filter-btn';
  });
  if (mode==='all')    btn.className='filter-btn f-all';
  if (mode==='active') btn.className='filter-btn f-active';
  if (mode==='hist')   btn.className='filter-btn f-hist';

  siteMarkers.forEach(m => {
    const show = mode==='all' ||
      (mode==='active' && m._status==='active') ||
      (mode==='hist'   && (m._status==='hist' || m._status==='partial'));
    show ? map.addLayer(m) : map.removeLayer(m);
  });
}

function toggleRail(btn) {
  railVisible = !railVisible;
  railPolylines.forEach(pl => railVisible ? map.addLayer(pl) : map.removeLayer(pl));
  btn.textContent = railVisible ? 'Hide Railways' : 'Show Railways';
  btn.className = railVisible ? 'filter-btn' : 'filter-btn f-hidrail';
}

// ── LEGEND ────────────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend-box');
  div.innerHTML = `
    <h3>⚗️ Ammonia Production Sites</h3>
    <div class="leg-item"><span class="leg-dot" style="background:#16a34a;border-color:#bbf7d0"></span>Active (currently producing NH₃)</div>
    <div class="leg-item"><span class="leg-dot" style="background:#d97706;border-color:#fef08a"></span>Repurposed / NH₃ consumer</div>
    <div class="leg-item"><span class="leg-dot" style="background:#dc2626;border-color:#fecaca"></span>Historical (production ceased)</div>
    <hr class="leg-sep"/>
    <h3>🚂 Freight Railway Lines</h3>
    <div class="leg-item"><span class="leg-line" style="background:#c2410c"></span>Rhine, Ruhr &amp; North Sea corridors</div>
    <div class="leg-item"><span class="leg-dash"></span>Central German chemical cluster</div>
    <div class="leg-item"><span class="leg-line" style="background:#1d4ed8"></span>East–West &amp; South connectors</div>
    <div class="leg-item"><span class="leg-line" style="background:#7c3aed"></span>Port connection (Brunsbüttel)</div>
    <div class="legend-note">Click any marker or line for details.<br>Use the layer icon (top-right) to change map style.<br>Fritz Haber (Nobel 1918) · Carl Bosch (Nobel 1931)</div>

};
legend.addTo(map);

// ── INFO PANEL ────────────────────────────────────────────────────────────
const infoPanel = L.control({ position: 'topleft' });
infoPanel.onAdd = function() {
  const div = L.DomUtil.create('div','info-box');
  div.innerHTML = `<strong>About the Haber-Bosch Process</strong>
    Fritz Haber synthesised ammonia from N₂ and H₂ under high pressure in 1909.
    Carl Bosch industrialised it for BASF at Oppau in 1913 — first to feed Germany's WWI munitions industry, then the world's farms.
    The process now produces ~185 million tonnes of NH₃/year, underpinning fertilisers that feed roughly half the world's population.`;
  return div;
};
infoPanel.addTo(map);
</script>
